services:
  app:
    build: .
    user: "1000:1000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv
      - ./storage:/app/storage
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - LLM_MODEL=${LLM_MODEL:-qwen3-8b-12k:latest}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-bge-m3:latest}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@db:5432/postgres?sslmode=disable}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - db

  worker:
    build: .
    user: "1000:1000"
    command: ["python", "-m", "app.worker.main"]
    volumes:
      - .:/app
      - /app/.venv
      - ./storage:/app/storage
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - LLM_MODEL=${LLM_MODEL:-qwen3-8b-12k:latest}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-bge-m3:latest}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@db:5432/postgres?sslmode=disable}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: pgvector/pgvector:pg17
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  dbmate:
    image: amacneil/dbmate
    user: "1000:1000"
    command: ["up"]
    volumes:
      - ./db:/db
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@db:5432/postgres?sslmode=disable}
    depends_on:
      - db

  sandbox:
    build:
      context: ./sandbox
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./sandbox/filesystem:/workspace
    working_dir: /workspace

volumes:
  postgres_data:
