services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.1.164:11434}
      - LLM_MODEL=${LLM_MODEL:-qwen3:8b-16k}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
